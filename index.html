<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giuliana's Garden Tea Party</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #87CEEB; 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            text-align: center; color: #333; overflow: hidden; 
            transition: background-color 1.5s ease; 
        }
        
        /* Sun / Moon / Storm Cloud */
        .sun {
            font-size: 100px; position: fixed; top: 20px; right: 40px;
            animation: spin 20s linear infinite; cursor: pointer; user-select: none; z-index: 50; 
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Rainbow Layer */
        #rainbow-layer {
            display: none; position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
            width: 700px; height: 350px; border-radius: 350px 350px 0 0;
            background: radial-gradient(circle at center 100%,
                transparent 50%, violet 50%, violet 55%, indigo 55%, indigo 60%,
                blue 60%, blue 65%, green 65%, green 70%, yellow 70%, yellow 75%,
                orange 75%, orange 80%, red 80%, red 85%, transparent 85%
            ); filter: blur(5px); opacity: 0.7; z-index: 2; 
        }

        /* Butterflies */
        .butterfly-container { transition: opacity 1s ease; }
        .butterfly {
            position: fixed; font-size: 40px; top: 150px; left: -50px;
            animation: fly 18s linear infinite; cursor: pointer; z-index: 10;
        }
        .butterfly2 { top: 250px; animation: fly 25s linear infinite 5s; }
        @keyframes fly {
            0% { left: -10%; transform: translateY(0px); }
            25% { transform: translateY(-30px); }
            50% { transform: translateY(20px); }
            75% { transform: translateY(-20px); }
            100% { left: 110%; transform: translateY(0px); }
        }

        /* Rain Layer */
        #rain-layer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 15; 
        }
        .rain-drop {
            position: absolute; background-color: rgba(255, 255, 255, 0.7);
            width: 2px; height: 15px; top: -20px;
            animation: fall 1s linear infinite; border-radius: 2px;
        }
        @keyframes fall { to { transform: translateY(105vh); } }

        /* Header Text */
        .header-text {
            margin-top: 80px; background-color: rgba(255, 255, 255, 0.85);
            display: inline-block; padding: 30px 50px; border-radius: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 3px dashed #FF69B4;
            position: relative; z-index: 5; 
            cursor: pointer; transition: transform 1s ease, opacity 1s ease;
        }
        h1 { margin: 0; font-size: 3rem; color: #FF1493; }
        p { font-size: 1.8rem; margin: 15px 0 0 0; color: #555; }

        /* The Grass */
        .grass {
            position: fixed; bottom: 0; width: 100%; min-height: 25vh;
            background-color: #7CFC00; border-top: 10px solid #32CD32;
            display: flex; align-items: flex-end; justify-content: space-evenly;
            padding-bottom: 20px; z-index: 20;
        }

        /* Scene Items */
        .scene-item {
            font-size: 70px; filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.2));
            cursor: pointer; user-select: none; transition: transform 1s ease; 
        }
        .tea-party { font-size: 80px; animation: bounce 4s ease-in-out infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .grown-flower { transform: scale(1.6) !important; } 
        .grow { transform: scale(2.2) translateY(-20px) !important; } 
        
        /* Poop Animation */
        .poop {
            position: fixed; font-size: 50px; z-index: 30; 
            animation: plop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; pointer-events: none; 
        }
        @keyframes plop { 0% { transform: scale(0) translateY(-30px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }

        /* --- NEW: ENTITY SYSTEM (Princesses & Unicorns separated) --- */
        .draggable {
            position: fixed; cursor: grab; user-select: none; touch-action: none;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
        }
        .draggable:active { cursor: grabbing; }
        .unicorn-entity { z-index: 40; width: 100px; height: 120px; }
        .princess-entity { z-index: 45; width: 80px; height: 100px; } /* Princesses sit in front */

        /* Animation Wrappers (Prevents Transform Conflicts) */
        .flip-wrapper { transition: transform 0.2s; }
        .anim-wrapper { transition: transform 0.2s; }
        
        .prancing { animation: prance 3s ease-in-out infinite; }
        .walking-bounce { animation: walk-bob 0.4s ease-in-out infinite alternate; }
        
        @keyframes prance { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px) rotate(-3deg); } }
        @keyframes walk-bob { 0% { transform: translateY(0); } 100% { transform: translateY(-8px); } }

        /* Click to Spin */
        .spin-magic { animation: cartwheel 0.8s ease-in-out !important; }
        @keyframes cartwheel { 0% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.4) rotate(180deg); } 100% { transform: scale(1) rotate(360deg); } }

        /* --- PRINCESS CONTENT --- */
        .princess-content { width: 100%; height: 100%; display: flex; justify-content: center; }
        .princess-content svg { width: 100%; height: 100%; }

        /* --- UNICORN CONTENT --- */
        .constructed-unicorn { position: relative; display: flex; flex-direction: column; align-items: center; width: 100%; height: 100%; }
        .u-head { font-size: 80px; margin-bottom: -15px; z-index: 6; }
        .u-body {
            width: 80px; height: 70px; background-color: white; border-radius: 50% 50% 20px 20px;
            border: 3px solid #eee; position: relative; box-shadow: 2px 4px 8px rgba(0,0,0,0.1); z-index: 5;
        }
        .u-body::before { /* Tail */ content: ''; position: absolute; bottom: 10px; right: -25px; width: 30px; height: 40px; border-radius: 50% 50% 0 0; background: linear-gradient(#FF69B4, #9370DB); border: 2px solid white; transform: rotate(15deg); }
        .u-body::after { /* Mane */ content: ''; position: absolute; top: -5px; left: 10px; width: 50px; height: 15px; border-radius: 10px; background: linear-gradient(#FFD700, #FF69B4, #9370DB); border: 1px solid white; }
        .u-leg-pair { position: absolute; width: 60px; bottom: -20px; left: 10px; display: flex; justify-content: space-between; z-index: 4; }
        .u-leg { width: 15px; height: 25px; background-color: white; border: 2px solid #eee; border-radius: 5px; position: relative; }
        .u-leg::after { content: ''; position: absolute; bottom: -4px; left: -1px; width: 17px; height: 6px; background-color: gold; border-radius: 3px; }
        
        .u-wing { position: absolute; top: 10px; width: 50px; height: 50px; background-color: rgba(255, 255, 255, 0.9); border-radius: 50% 10px 50% 50%; border: 3px solid white; z-index: 4; animation: flutter 2s ease-in-out infinite; }
        .u-wing::after { content: ''; position: absolute; top: 10px; left: 10px; width: 25px; height: 25px; border-radius: 50%; border: 2px dashed #9370DB; }
        .u-wing-right { right: -20px; }
        .u-wing-left { left: -20px; animation-name: flutter-left; }

        @keyframes flutter { 0%, 100% { transform: translateY(0) scaleY(1); } 50% { transform: translateY(-5px) scaleY(1.05); } }
        @keyframes flutter-left { 0%, 100% { transform: scaleX(-1) translateY(0) scaleY(1); } 50% { transform: scaleX(-1) translateY(-5px) scaleY(1.05); } }

        /* Tea Party Message */
        #tea-message {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background-color: #FFF0F5; border: 5px solid #FF69B4; border-radius: 30px;
            padding: 30px; font-size: 2.5rem; color: #FF1493; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.3); cursor: pointer;
        }
    </style>
</head>
<body id="sky">

    <div class="sun" onclick="changeSky()" title="Click to change the sky!">☀️</div>
    <div id="rainbow-layer"></div>
    <div class="butterfly-container" id="bugs">
        <div class="butterfly" onclick="this.style.display='none'">🦋</div>
        <div class="butterfly butterfly2" onclick="this.style.display='none'">🦋</div>
    </div>
    <div id="rain-layer"></div>

    <div class="header-text" onclick="this.style.transform='translateY(-200px)'; this.style.opacity='0'; this.style.pointerEvents='none';">
        <h1>Hello world, this is Giuliana.</h1>
        <p>Welcome to my garden tea party! 🫖✨</p>
    </div>

    <div id="tea-message" onclick="closeMessage()">
        "Would you like a cup of tea and a cupcake?" 🧁☕<br>
        <span style="font-size: 1.5rem; color: #555;">(Click to close)</span>
    </div>

    <div class="grass">
        <div class="scene-item flower" onclick="makeGrow(this)">🌻</div>
        <div class="scene-item flower" onclick="makeGrow(this)">🌷😊</div>
        <div class="scene-item tea-party" onclick="showTeaMessage()">☕🧁🫖</div>
        <div class="scene-item flower" onclick="makeGrow(this)">🌷😊</div>
        <div class="scene-item flower" onclick="makeGrow(this)">🌻</div>
    </div>

    <div id="u1" class="draggable unicorn-entity" style="left: 15%; top: 40%;">
        <div class="flip-wrapper">
            <div class="anim-wrapper prancing">
                <div class="spin-magic-target constructed-unicorn">
                    <div class="u-head">🦄</div>
                    <div class="u-wing u-wing-right"></div><div class="u-wing u-wing-left"></div>
                    <div class="u-body"><div class="u-leg-pair"><div class="u-leg"></div><div class="u-leg"></div></div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="u2" class="draggable unicorn-entity" style="right: 15%; top: 50%;">
        <div class="flip-wrapper">
            <div class="anim-wrapper prancing">
                <div class="spin-magic-target constructed-unicorn">
                    <div class="u-head">🦄</div>
                    <div class="u-wing u-wing-right"></div><div class="u-wing u-wing-left"></div>
                    <div class="u-body"><div class="u-leg-pair"><div class="u-leg"></div><div class="u-leg"></div></div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="p1" class="draggable princess-entity" style="left: 0; top: 0;">
        <div class="flip-wrapper">
            <div class="anim-wrapper"> <div class="spin-magic-target princess-content">
                    <svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
                        <path d="M 50,20 C 30,20,15,40,15,60 C 15,80,25,90,30,90 C 35,90,40,80,45,80 C 50,80,55,90,60,90 C 65,90,75,80,75,60 C 75,40,70,20,50,20 Z" fill="#8B4513"/>
                        <path d="M 40,80 C 20,80,10,100,10,130 C 10,150,90,150,90,130 C 90,100,80,80,60,80 Z" fill="#FF69B4" stroke="#e0e0e0" stroke-width="2"/>
                        <ellipse cx="50" cy="55" rx="15" ry="18" fill="#FFE4C4"/>
                        <ellipse cx="45" cy="52" rx="2" ry="3" fill="#333"/> <ellipse cx="55" cy="52" rx="2" ry="3" fill="#333"/>
                        <path d="M 45,62 C 48,65,52,65,55,62" stroke="#FF1493" stroke-width="2" fill="none" stroke-linecap="round"/>
                        <path d="M 40,40 L 40,30 L 45,35 L 50,30 L 55,35 L 60,30 L 60,40 Z" fill="#FFD700" stroke="#f1c40f" stroke-width="1"/>
                        <ellipse cx="40" cy="75" rx="5" ry="5" fill="#e0e0e0" stroke="white"/> <ellipse cx="60" cy="75" rx="5" ry="5" fill="#e0e0e0" stroke="white"/>
                        <rect x="48" y="85" width="4" height="20" rx="2" fill="white" opacity="0.5"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <div id="p2" class="draggable princess-entity" style="left: 0; top: 0;">
        <div class="flip-wrapper">
            <div class="anim-wrapper">
                <div class="spin-magic-target princess-content">
                    <svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
                        <path d="M 50,20 C 65,20,75,30,75,45 C 75,60,65,70,50,70 C 35,70,25,60,25,45 C 25,30,35,20,50,20 Z M 50,15 C 60,15,65,10,65,5 C 65,-2,50,2,50,-2" fill="#F0E68C"/>
                        <path d="M 40,75 C 20,75,10,95,10,125 C 10,145,90,145,90,125 C 90,95,80,75,60,75 Z" fill="#9370DB" stroke="#e0e0e0" stroke-width="2"/>
                        <ellipse cx="50" cy="50" rx="15" ry="18" fill="#FFE4C4"/>
                        <ellipse cx="45" cy="47" rx="2" ry="3" fill="#333"/> <ellipse cx="55" cy="47" rx="2" ry="3" fill="#333"/>
                        <path d="M 45,57 C 48,60,52,60,55,57" stroke="#FF1493" stroke-width="2" fill="none" stroke-linecap="round"/>
                        <path d="M 42,35 L 45,28 L 50,25 L 55,28 L 58,35" fill="#e0e0e0" stroke="#eee" stroke-width="1.5"/>
                        <path d="M 40,75 L 50,85 L 60,75" fill="#e0e0e0" stroke="white" stroke-width="1"/>
                        <rect x="48" y="90" width="4" height="25" rx="2" fill="white" opacity="0.3"/> 
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. SKY & RAIN LOGIC
        let skyColors = ['#87CEEB', '#FFB6C1', '#2C3E50', '#778899', '#87CEEB']; 
        let sunIcons = ['☀️', '🌞', '🌙', '☁️', '☀️']; 
        let skyIndex = 0;

        function changeSky() {
            skyIndex = (skyIndex + 1) % skyColors.length;
            document.getElementById('sky').style.backgroundColor = skyColors[skyIndex];
            document.querySelector('.sun').innerText = sunIcons[skyIndex];

            const rainLayer = document.getElementById('rain-layer');
            const rainbowLayer = document.getElementById('rainbow-layer');
            const butterflies = document.getElementById('bugs');
            const flowers = document.querySelectorAll('.flower');

            rainLayer.style.display = 'none'; rainbowLayer.style.display = 'none'; butterflies.style.opacity = '1'; 

            if (skyIndex === 0) flowers.forEach(f => f.classList.remove('grown-flower'));
            else if (skyIndex === 3) { rainLayer.style.display = 'block'; butterflies.style.opacity = '0'; createRain(); }
            else if (skyIndex === 4) { rainbowLayer.style.display = 'block'; flowers.forEach(f => f.classList.add('grown-flower')); }
        }

        function createRain() {
            const rainContainer = document.getElementById('rain-layer');
            rainContainer.innerHTML = ''; 
            for (let i = 0; i < 100; i++) {
                let drop = document.createElement('div');
                drop.classList.add('rain-drop');
                drop.style.left = Math.random() * 100 + 'vw'; 
                drop.style.animationDelay = Math.random() * 2 + 's'; 
                drop.style.opacity = Math.random(); 
                rainContainer.appendChild(drop);
            }
        }

        // Click Effects
        function makeGrow(el) { el.classList.add('grow'); setTimeout(() => el.classList.remove('grow'), 800); }
        function showTeaMessage() { document.getElementById('tea-message').style.display = 'block'; }
        function closeMessage() { document.getElementById('tea-message').style.display = 'none'; }

        // --- THE NEW GAME ENGINE FOR WALKING & RIDING ---
        let ents = [
            { id: 'u1', type: 'unicorn', el: document.getElementById('u1'), vx: 1.5, walking: false, flipped: false, grassY: 0 },
            { id: 'u2', type: 'unicorn', el: document.getElementById('u2'), vx: -1.5, walking: false, flipped: true, grassY: 0 },
            { id: 'p1', type: 'princess', el: document.getElementById('p1'), vx: 1, walking: false, riding: 'u1', flipped: false, grassY: 0 },
            { id: 'p2', type: 'princess', el: document.getElementById('p2'), vx: -1, walking: false, riding: 'u2', flipped: true, grassY: 0 }
        ];

        // Apply initial visual directions
        ents.forEach(ent => { ent.el.querySelector('.flip-wrapper').style.transform = ent.flipped ? 'scaleX(-1)' : 'scaleX(1)'; });

        let activeRider = null; let isDragging = false; let offsetX = 0; let offsetY = 0;

        function updateLoop() {
            ents.forEach(ent => {
                if (activeRider === ent.el) return; // Skip updating the one currently being dragged

                // If Princess is riding, strictly follow her unicorn
                if (ent.type === 'princess' && ent.riding) {
                    let u = ents.find(e => e.id === ent.riding);
                    if (u && activeRider !== ent.el) {
                        let uRect = u.el.getBoundingClientRect();
                        ent.el.style.left = (uRect.left + 10) + 'px'; // Center on back
                        ent.el.style.top = (uRect.top - 50) + 'px'; // Sit on back
                        
                        if (ent.flipped !== u.flipped) { // Match orientation
                            ent.flipped = u.flipped;
                            ent.el.querySelector('.flip-wrapper').style.transform = ent.flipped ? 'scaleX(-1)' : 'scaleX(1)';
                        }
                        return;
                    }
                }

                // If walking, move side to side
                if (ent.walking) {
                    let rect = ent.el.getBoundingClientRect();
                    let newX = rect.left + ent.vx;
                    
                    if (newX <= 0) {
                        newX = 0; ent.vx *= -1; ent.flipped = false;
                    } else if (newX + rect.width >= window.innerWidth) {
                        newX = window.innerWidth - rect.width; ent.vx *= -1; ent.flipped = true;
                    }
                    
                    ent.el.style.left = newX + 'px';
                    ent.el.style.top = ent.grassY + 'px'; // Lock to ground level
                    ent.el.querySelector('.flip-wrapper').style.transform = ent.flipped ? 'scaleX(-1)' : 'scaleX(1)';
                }
            });
            requestAnimationFrame(updateLoop);
        }
        requestAnimationFrame(updateLoop);

        // --- DRAG, DROP, CLICK LOGIC ---
        const draggableItems = document.querySelectorAll('.draggable');
        draggableItems.forEach(item => {
            item.addEventListener('mousedown', dragStart);
            item.addEventListener('touchstart', dragStart, { passive: false });
        });
        document.addEventListener('mouseup', dragEnd); document.addEventListener('touchend', dragEnd);
        document.addEventListener('mousemove', drag); document.addEventListener('touchmove', drag, { passive: false });

        function dragStart(e) {
            activeRider = this; isDragging = false; 
            let rect = activeRider.getBoundingClientRect();
            
            let ent = ents.find(e => e.el === activeRider);
            if (ent && ent.type === 'princess' && ent.riding) {
                // Instantly detach princess from unicorn when grabbed
                ent.riding = null;
            }

            if (e.type === 'touchstart') { offsetX = e.touches[0].clientX - rect.left; offsetY = e.touches[0].clientY - rect.top; } 
            else { offsetX = e.clientX - rect.left; offsetY = e.clientY - rect.top; }
            
            // Stop animations while dragging
            if (ent) ent.el.querySelector('.anim-wrapper').className = 'anim-wrapper';
        }

        function drag(e) {
            if (activeRider) {
                e.preventDefault(); isDragging = true;
                let clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                let clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                activeRider.style.left = (clientX - offsetX) + 'px';
                activeRider.style.top = (clientY - offsetY) + 'px';
            }
        }

        function dragEnd(e) {
            if (!activeRider) return;
            
            let ent = ents.find(e => e.el === activeRider);
            if (ent) {
                let rect = ent.el.getBoundingClientRect();
                // Check if they were dropped in the grass area at the bottom
                let isGrass = rect.bottom > window.innerHeight - 200; 

                if (!isDragging) {
                    // ACTION: It was just a click!
                    let animTarget = ent.el.querySelector('.spin-magic-target');
                    animTarget.classList.add('spin-magic');
                    setTimeout(() => animTarget.classList.remove('spin-magic'), 800);

                    if (ent.type === 'unicorn') {
                        // Drop 💩
                        let poop = document.createElement('div'); poop.innerText = '💩'; poop.className = 'poop';
                        let bodyRect = ent.el.getBoundingClientRect();
                        
                        // Check which way the unicorn is facing to drop it behind them
                        if (ent.flipped) poop.style.left = (bodyRect.left - 20) + 'px';
                        else poop.style.left = (bodyRect.right - 10) + 'px';
                        
                        poop.style.top = (bodyRect.bottom - 20) + 'px'; 
                        document.body.appendChild(poop);
                        setTimeout(() => { poop.style.transition = "opacity 1s"; poop.style.opacity = "0"; setTimeout(() => poop.remove(), 1000); }, 3000);
                    }
                    
                    // Put back to walking or flying
                    if (ent.walking) ent.el.querySelector('.anim-wrapper').classList.add('walking-bounce');
                    else ent.el.querySelector('.anim-wrapper').classList.add('prancing');
                    
                } else {
                    // ACTION: It was a drag and drop!
                    let mounted = false;

                    if (ent.type === 'princess') {
                        // Check if she was dropped close enough to a unicorn to ride it
                        let unicorns = ents.filter(x => x.type === 'unicorn');
                        for (let u of unicorns) {
                            let uRect = u.el.getBoundingClientRect();
                            let dx = (rect.left + rect.width/2) - (uRect.left + uRect.width/2);
                            let dy = (rect.top + rect.height/2) - (uRect.top + uRect.height/2);
                            if (Math.sqrt(dx*dx + dy*dy) < 120) { 
                                ent.riding = u.id; // MOUNT UP!
                                ent.walking = false;
                                mounted = true;
                                break;
                            }
                        }
                    }

                    if (!mounted) {
                        if (isGrass) {
                            // Land and Walk
                            ent.walking = true;
                            // Stagger their walking paths slightly so they aren't on the exact same line
                            ent.grassY = window.innerHeight - rect.height - (Math.random() * 30); 
                            if (ent.type === 'princess') ent.grassY -= 20; 
                            
                            ent.el.style.top = ent.grassY + 'px';
                            ent.el.querySelector('.anim-wrapper').classList.add('walking-bounce');
                        } else {
                            // Fly in the sky
                            ent.walking = false;
                            ent.el.querySelector('.anim-wrapper').classList.add('prancing');
                        }
                    }
                }
            }
            activeRider = null;
        }
    </script>
</body>
</html>
