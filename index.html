<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giuliana's Garden Tea Party</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #87CEEB; /* Sky blue */
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            text-align: center; color: #333;
            overflow: hidden; /* Prevents screen scrolling while dragging */
            transition: background-color 1.5s ease; 
        }
        
        /* Sun / Moon / Storm Cloud */
        .sun {
            font-size: 100px; position: fixed; top: 20px; right: 40px;
            animation: spin 20s linear infinite; cursor: pointer; user-select: none; z-index: 50; 
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Rainbow Layer */
        #rainbow-layer {
            display: none; position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
            width: 700px; height: 350px; border-radius: 350px 350px 0 0;
            background: radial-gradient(circle at center 100%,
                transparent 50%, violet 50%, violet 55%, indigo 55%, indigo 60%,
                blue 60%, blue 65%, green 65%, green 70%, yellow 70%, yellow 75%,
                orange 75%, orange 80%, red 80%, red 85%, transparent 85%
            );
            filter: blur(5px); opacity: 0.7; z-index: 2; 
        }

        /* Butterflies */
        .butterfly-container { transition: opacity 1s ease; }
        .butterfly {
            position: fixed; font-size: 40px; top: 150px; left: -50px;
            animation: fly 18s linear infinite; cursor: pointer; z-index: 10;
        }
        .butterfly2 { top: 250px; animation: fly 25s linear infinite 5s; }
        @keyframes fly {
            0% { left: -10%; transform: translateY(0px); }
            25% { transform: translateY(-30px); }
            50% { transform: translateY(20px); }
            75% { transform: translateY(-20px); }
            100% { left: 110%; transform: translateY(0px); }
        }

        /* Rain Layer */
        #rain-layer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 15; 
        }
        .rain-drop {
            position: absolute; background-color: rgba(255, 255, 255, 0.7);
            width: 2px; height: 15px; top: -20px;
            animation: fall 1s linear infinite; border-radius: 2px;
        }
        @keyframes fall { to { transform: translateY(105vh); } }

        /* Header Text (Click to hide) */
        .header-text {
            margin-top: 80px; background-color: rgba(255, 255, 255, 0.85);
            display: inline-block; padding: 30px 50px; border-radius: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 3px dashed #FF69B4;
            position: relative; z-index: 5; 
            cursor: pointer; transition: transform 1s ease, opacity 1s ease;
        }
        h1 { margin: 0; font-size: 3rem; color: #FF1493; }
        p { font-size: 1.8rem; margin: 15px 0 0 0; color: #555; }

        /* The Grass */
        .grass {
            position: fixed; bottom: 0; width: 100%; min-height: 25vh;
            background-color: #7CFC00; border-top: 10px solid #32CD32;
            display: flex; align-items: flex-end; justify-content: space-evenly;
            padding-bottom: 20px; z-index: 20;
        }

        /* Scene Items (Flowers/Tea set) */
        .scene-item {
            font-size: 70px; filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.2));
            cursor: pointer; user-select: none; transition: transform 1s ease; 
        }
        .tea-party { font-size: 80px; animation: bounce 4s ease-in-out infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Temporary click grow and Permanent rain grow effects */
        .grown-flower { transform: scale(1.6) !important; } 
        .grow { transform: scale(2.2) translateY(-20px) !important; } 
        
        /* Poop Animation */
        .poop {
            position: fixed; font-size: 50px; z-index: 30; 
            animation: plop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; pointer-events: none; 
        }
        @keyframes plop { 0% { transform: scale(0) translateY(-30px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }

        /* --- THE MAGIC DRAGGABLE UNICORN RIDERS (Updated with full bodies!) --- */
        .draggable-rider {
            position: fixed; cursor: grab; z-index: 40; user-select: none; touch-action: none;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
        }
        .draggable-rider:active { cursor: grabbing; }
        
        /* Gentle Prancing Animation */
        .prancing { animation: prance 3s ease-in-out infinite; }
        @keyframes prance {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px) rotate(-3deg); }
        }

        /* The Princess Rider (sitting on the constructed body) */
        .rider-princess {
            position: absolute; top: -10px; left: 15px; transform: scale(0.65);
            display: flex; flex-direction: column; align-items: center;
            pointer-events: none; /* Dragging grabs the whole unit */
        }
        .p-head { font-size: 60px; margin-bottom: -15px; }
        .p-body {
            width: 60px; height: 60px; border-radius: 50% 50% 10px 10px;
            border: 3px solid white; box-shadow: 2px 4px 5px rgba(0,0,0,0.2);
            position: relative; background-color: hotpink;
        }
        .p-body::after {
            content: ''; position: absolute; bottom: -8px; left: 10px; width: 40px; height: 10px;
            background-color: #f1c40f; border-radius: 5px; /* Golden shoes */
        }
        .p2-color .p-body { background-color: mediumpurple; }

        /* --- THE CONSTRUCTED FULL-BODY UNICORN STYLING --- */
        .constructed-unicorn {
            position: relative;
            display: flex; flex-direction: column; align-items: center;
            width: 100px; height: 120px; /* Base container size */
            transition: transform 0.8s ease-in-out; /* For the cartwheel */
            pointer-events: none; /* Make sure dragging targets the outer rider */
        }

        /* Head (The Emoji) */
        .u-head { font-size: 80px; margin-bottom: -15px; z-index: 5; }
        
        /* Body (Built with CSS) */
        .u-body {
            width: 80px; height: 70px; background-color: white;
            border-radius: 50% 50% 20px 20px; /* Simple oval/body shape */
            border: 3px solid #eee; position: relative;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.1);
        }

        /* Tail and Mane details (pure CSS shadows/ovals) */
        .u-body::before { /* Tail */
            content: ''; position: absolute; bottom: 10px; right: -25px;
            width: 30px; height: 40px; border-radius: 50% 50% 0 0;
            background: linear-gradient(#FF69B4, #9370DB); /* Pink to purple tail */
            border: 2px solid white; transform: rotate(15deg);
        }
        .u-body::after { /* Mane */
            content: ''; position: absolute; top: -5px; left: 10px;
            width: 50px; height: 15px; border-radius: 10px;
            background: linear-gradient(#FFD700, #FF69B4, #9370DB); /* Colorful mane */
            border: 1px solid white;
        }

        /* Legs (Pseudo-elements from the main body element) */
        .u-leg-pair {
            position: absolute; width: 60px; bottom: -20px; left: 10px;
            display: flex; justify-content: space-between;
        }
        .u-leg {
            width: 15px; height: 25px; background-color: white;
            border: 2px solid #eee; border-radius: 5px; position: relative;
        }
        .u-leg::after { /* Shoes */
            content: ''; position: absolute; bottom: -4px; left: -1px;
            width: 17px; height: 6px; background-color: gold; border-radius: 3px;
        }
        
        /* Wings! (Positioned on the side of the body) */
        .u-wing {
            position: absolute; top: -10px;
            width: 50px; height: 50px; background-color: rgba(255, 255, 255, 0.9);
            border-radius: 50% 10px 50% 50%; /* Feathery shape */
            border: 3px solid white; z-index: 4;
            display: flex; justify-content: space-between; align-items: flex-end; padding: 2px;
            animation: flutter 2s ease-in-out infinite;
        }
        /* Wing feathery bits hint */
        .u-wing::after {
            content: ''; position: absolute; top: 10px; left: 10px; width: 25px; height: 25px;
            border-radius: 50%; border: 2px dashed #9370DB; /* Purple highlights */
        }

        .u-wing-right { right: -20px; top: 10px; }
        .u-wing-left { left: -20px; top: 10px; transform: scaleX(-1); }

        /* Wing flutter animation */
        @keyframes flutter {
            0%, 100% { transform: translateY(0) scaleY(1); }
            50% { transform: translateY(-5px) scaleY(1.05); }
        }
        
        /* Apply flutter separately for the left wing to handle flipping */
        .u-wing-left { animation-name: flutter-left; }
        @keyframes flutter-left {
            0%, 100% { transform: scaleX(-1) translateY(0) scaleY(1); }
            50% { transform: scaleX(-1) translateY(-5px) scaleY(1.05); }
        }

        /* Flips the entire constructed unit for the second rider */
        .flip-unicorn { transform: scaleX(-1) !important; }

        /* The Spin/Cartwheel Animation (Applied to the constructed-unicorn element) */
        .spin-magic { animation: cartwheel 0.8s ease-in-out !important; }
        @keyframes cartwheel {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.4) rotate(180deg); }
            100% { transform: scale(1) rotate(360deg); }
        }

        /* Tea Party Message Box */
        #tea-message {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background-color: #FFF0F5; border: 5px solid #FF69B4; border-radius: 30px;
            padding: 30px; font-size: 2.5rem; color: #FF1493; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); cursor: pointer;
        }
    </style>
</head>
<body id="sky">

    <div class="sun" onclick="changeSky()" title="Click to change the sky!">☀️</div>

    <div id="rainbow-layer"></div>

    <div class="butterfly-container" id="bugs">
        <div class="butterfly" onclick="this.style.display='none'">🦋</div>
        <div class="butterfly butterfly2" onclick="this.style.display='none'">🦋</div>
    </div>

    <div id="rain-layer"></div>

    <div class="header-text" onclick="this.style.transform='translateY(-200px)'; this.style.opacity='0'; this.style.pointerEvents='none';" title="Click to hide me!">
        <h1>Hello world, this is Giuliana.</h1>
        <p>Welcome to my garden tea party! 🫖✨</p>
    </div>

    <div id="tea-message" onclick="closeMessage()">
        "Would you like a cup of tea and a cupcake?" 🧁☕<br>
        <span style="font-size: 1.5rem; color: #555;">(Click to close)</span>
    </div>

    <div class="grass">
        <div class="scene-item flower" onclick="makeGrow(this)">🌻</div>
        <div class="scene-item flower" onclick="makeGrow(this)">🌷😊</div>
        <div class="scene-item tea-party" onclick="showTeaMessage()" title="Click for tea!">☕🧁🫖</div>
        <div class="scene-item flower" onclick="makeGrow(this)">🌷😊</div>
        <div class="scene-item flower" onclick="makeGrow(this)">🌻</div>
    </div>

    <div class="draggable-rider prancing" style="left: 15%; bottom: 30px;">
        <div class="rider-princess">
            <div class="p-head">👸</div><div class="p-body"></div>
        </div>
        <div class="constructed-unicorn">
            <div class="u-head">🦄</div>
            <div class="u-wing u-wing-right"></div>
            <div class="u-wing u-wing-left"></div>
            <div class="u-body">
                <div class="u-leg-pair">
                    <div class="u-leg"></div><div class="u-leg"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="draggable-rider prancing" style="right: 15%; bottom: 30px;">
        <div class="rider-princess p2-color">
            <div class="p-head">👸</div><div class="p-body"></div>
        </div>
        <div class="constructed-unicorn flip-unicorn">
            <div class="u-head">🦄</div>
            <div class="u-wing u-wing-right"></div>
            <div class="u-wing u-wing-left"></div>
            <div class="u-body">
                <div class="u-leg-pair">
                    <div class="u-leg"></div><div class="u-leg"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. SKY & RAIN LOGIC
        let skyColors = ['#87CEEB', '#FFB6C1', '#2C3E50', '#778899', '#87CEEB']; 
        let sunIcons = ['☀️', '🌞', '🌙', '☁️', '☀️']; 
        let skyIndex = 0;

        function changeSky() {
            skyIndex = (skyIndex + 1) % skyColors.length;
            document.getElementById('sky').style.backgroundColor = skyColors[skyIndex];
            document.querySelector('.sun').innerText = sunIcons[skyIndex];

            const rainLayer = document.getElementById('rain-layer');
            const rainbowLayer = document.getElementById('rainbow-layer');
            const butterflies = document.getElementById('bugs');
            const flowers = document.querySelectorAll('.flower');

            rainLayer.style.display = 'none';
            rainbowLayer.style.display = 'none';
            butterflies.style.opacity = '1'; 

            if (skyIndex === 0) {
                // Reset flowers when it's a new sunny day
                flowers.forEach(f => f.classList.remove('grown-flower'));
            } else if (skyIndex === 3) {
                // Rain!
                rainLayer.style.display = 'block';
                butterflies.style.opacity = '0'; 
                createRain(); 
            } else if (skyIndex === 4) {
                // Rainbow! Grow the flowers!
                rainbowLayer.style.display = 'block';
                flowers.forEach(f => f.classList.add('grown-flower'));
            }
        }

        function createRain() {
            const rainContainer = document.getElementById('rain-layer');
            rainContainer.innerHTML = ''; 
            for (let i = 0; i < 100; i++) {
                let drop = document.createElement('div');
                drop.classList.add('rain-drop');
                drop.style.left = Math.random() * 100 + 'vw'; 
                drop.style.animationDelay = Math.random() * 2 + 's'; 
                drop.style.opacity = Math.random(); 
                rainContainer.appendChild(drop);
            }
        }

        // 2. CLICK EFFECTS (Flowers, Poop, Tea)
        function makeGrow(element) {
            element.classList.add('grow');
            setTimeout(() => { element.classList.remove('grow'); }, 800); 
        }

        // Updated unicornSurprise function: finds the constructed-unicorn and targets it for spin/poop
        function unicornSurprise(activeRider) {
            const unicorn = activeRider.querySelector('.constructed-unicorn');
            unicorn.classList.add('spin-magic');
            setTimeout(() => { unicorn.classList.remove('spin-magic'); }, 800); 

            let poop = document.createElement('div');
            poop.innerText = '💩'; 
            poop.className = 'poop';
            
            // Get position relative to the main body element
            let bodyRect = activeRider.querySelector('.u-body').getBoundingClientRect();
            
            // Poop placement logic for the full-body unicorn
            poop.style.left = (bodyRect.right - 10) + 'px'; // Drop it near the back
            poop.style.top = (bodyRect.bottom - 10) + 'px'; 
            document.body.appendChild(poop);

            setTimeout(() => {
                poop.style.transition = "opacity 1s ease-out";
                poop.style.opacity = "0";
                setTimeout(() => poop.remove(), 1000);
            }, 3000);
        }

        function showTeaMessage() { document.getElementById('tea-message').style.display = 'block'; }
        function closeMessage() { document.getElementById('tea-message').style.display = 'none'; }

        // 3. DRAG TO FLY LOGIC (Works on Mouse and Touch!)
        const riders = document.querySelectorAll('.draggable-rider');
        let activeRider = null;
        let isDragging = false;
        let offsetX = 0; let offsetY = 0;

        riders.forEach(rider => {
            rider.addEventListener('mousedown', dragStart);
            rider.addEventListener('touchstart', dragStart, { passive: false });
        });

        document.addEventListener('mouseup', dragEnd);
        document.addEventListener('touchend', dragEnd);
        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, { passive: false });

        function dragStart(e) {
            activeRider = this;
            isDragging = false; 
            let rect = activeRider.getBoundingClientRect();
            if (e.type === 'touchstart') {
                offsetX = e.touches[0].clientX - rect.left;
                offsetY = e.touches[0].clientY - rect.top;
            } else {
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;
            }
            activeRider.classList.remove('prancing');
        }

        function drag(e) {
            if (activeRider) {
                e.preventDefault(); // Prevents screen pulling down on mobile
                isDragging = true;
                let clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                let clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                activeRider.style.left = (clientX - offsetX) + 'px';
                activeRider.style.top = (clientY - offsetY) + 'px';
                activeRider.style.bottom = 'auto'; 
                activeRider.style.right = 'auto';
            }
        }

        function dragEnd(e) {
            if (activeRider) {
                if (!isDragging) {
                    // Click! Drop poop/spin.
                    unicornSurprise(activeRider);
                }
                activeRider.classList.add('prancing');
                activeRider = null;
            }
        }
    </script>

</body>
</html>
